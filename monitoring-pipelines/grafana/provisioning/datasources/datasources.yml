apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus-1701:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: 5s
  - name: Loki
    type: loki
    access: proxy
    url: http://loki-1701:3100
    isDefault: false
